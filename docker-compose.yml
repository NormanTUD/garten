services:
  db:
    image: postgres:16-alpine
    container_name: gartenapp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gartenapp
      POSTGRES_USER: gartenapp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gartenapp_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gartenapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: gartenapp-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://gartenapp:${POSTGRES_PASSWORD:-gartenapp_secret}@db:5432/gartenapp
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: gartenapp-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

  apache:
    build:
      context: ./apache
      dockerfile: Dockerfile
    container_name: gartenapp-apache
    restart: unless-stopped
    ports:
      #- "127.0.0.1:8181:80"
      - "8181:80"
      - "8282:443"
    volumes:
      - ./apache/certs:/etc/ssl/gartenapp:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  pgdata:
    driver: local
  backend-data:
    driver: local
  backend-uploads:
    driver: local
