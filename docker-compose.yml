services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: gartenapp-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: gartenapp-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

  apache:
    build:
      context: ./apache
      dockerfile: Dockerfile
    container_name: gartenapp-apache
    restart: unless-stopped
    ports:
      - "8181:80"
      - "443:443"
    volumes:
      - ./apache/certs:/etc/ssl/gartenapp:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  backend-data:
    driver: local
  backend-uploads:
    driver: local
