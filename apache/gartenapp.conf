<VirtualHost *:80>
    ServerName gartenapp.local

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # API requests → Backend (FastAPI)
    ProxyPreserveHost On

    # WebSocket support (for dev hot-reload, future real-time features)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/api/(.*) ws://backend:8000/api/$1 [P,L]

    # REST API
    ProxyPass /api http://backend:8000/api
    ProxyPassReverse /api http://backend:8000/api

    # OpenAPI docs
    ProxyPass /docs http://backend:8000/docs
    ProxyPassReverse /docs http://backend:8000/docs
    ProxyPass /redoc http://backend:8000/redoc
    ProxyPassReverse /redoc http://backend:8000/redoc
    ProxyPass /openapi.json http://backend:8000/openapi.json
    ProxyPassReverse /openapi.json http://backend:8000/openapi.json

    # Everything else → Frontend (static files via nginx)
    ProxyPass / http://frontend:80/
    ProxyPassReverse / http://frontend:80/

    # Logging
    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
